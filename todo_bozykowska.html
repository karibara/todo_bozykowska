<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <!-- czcionki z google fonts - SpaceMono na nagłówki, DMSans do reszty -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
         /* reset - bez tego przeglądarki dodają domyślne marginesy i to wygląda źle */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0e0e0e;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      padding: 20px 16px;
      min-height: 100vh;
    }

    .container {
      max-width: 620px;
      margin: 0 auto; /* centruje kontener na szerokich ekranach */
    }

    /* nagłówek */
    .header {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid #2e2e2e;
    }

    .header h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    /* podkreślenie pod słowem "zadań" - dekoracja */
    .header h1 .underline {
      position: relative;
      display: inline-block;
    }
    .header h1 .underline::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 0;
      width: 100%;
      height: 3px;
      background-color: #f97316;
      
    }

    .header p {
      margin-top: 8px;
      font-size: 14px;
      color: #737373;
    }

    /* input */
    #taskInput {
      flex: 1 1 200px;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    #taskInput:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
    }

    #taskInput::placeholder {
      color: #737373;
    }

    /* przyciski - bazowe style */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      transition: background 0.18s, transform 0.18s;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: #f97316;
      color: #fff;
    }
    .btn-primary:hover {
      background: #c2510c;
    }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Lista <span class="underline">zadań</span></h1>
            <p>Dodaj, oznacz, filtruj. Nic nie ucieknie.</p>
        </header>

        <!-- formularz do dodawania zadań -->
        <!-- div zamaist form, żeby nie przeładowywało strony -->
        <div>
            <input 
            type="text" 
            id="taskInput" 
            placeholder="Co masz do zrobienia?"
            maxlength="200"
            >
            <button class="btn btn-primary" onclick="addTask()">+ Dodaj</button>
    </div>
    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const task = input.value.trim();
            if (task) {
                const li = document.createElement('li');
                li.textContent = task;
                li.onclick = () => li.remove(); // Click to remove
                document.getElementById('taskList').appendChild(li);
                input.value = '';
            }
        }
    </script>
</body>
</html>
