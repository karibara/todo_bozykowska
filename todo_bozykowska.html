<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <!-- czcionki z google fonts - Oswald na nagłówki, Lato do reszty -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input { padding: 8px; width: 200px; }
        button { padding: 8px 12px; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 5px 0; }
    </style>
</head>
<body>
    <div>
        <header>
            <h1>Lista zadań</h1>
        </header>

        <!-- formularz do dodawania zadań -->
        <!-- div zamaist form, żeby nie przeładowywało strony -->
        <div>
            <input 
            type="text" 
            id="taskInput" 
            placeholder="Co masz do zrobienia?"
            maxlength="200"
            >
            <button onclick="addTask()">+ Dodaj</button>
    </div>
    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const task = input.value.trim();
            if (task) {
                const li = document.createElement('li');
                li.textContent = task;
                li.onclick = () => li.remove(); // Click to remove
                document.getElementById('taskList').appendChild(li);
                input.value = '';
            }
        }
    </script>
</body>
</html>
