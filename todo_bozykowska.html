<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>

    <!-- czcionki z google fonts - SpaceMono na nagłówki, DMSans do reszty -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* reset - bez tego przeglądarki dodają domyślne marginesy i to wygląda źle */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0e0e0e;
        color: #f0ede8;
        font-family: "DM Sans", sans-serif;
        font-size: 16px;
        padding: 20px 16px;
        min-height: 100vh;
      }

      .container {
        max-width: 620px;
        margin: 0 auto; /* centruje kontener na szerokich ekranach */
      }

      /* nagłówek */
      .header {
        margin-bottom: 40px;
        padding-bottom: 24px;
        border-bottom: 1px solid #2e2e2e;
      }

      .header h1 {
        font-family: "Space Mono", monospace;
        font-size: clamp(28px, 6vw, 42px);
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      /* podkreślenie pod słowem "zadań" - dekoracja */
      .header h1 .underline {
        position: relative;
        display: inline-block;
      }
      .header h1 .underline::after {
        content: "";
        position: absolute;
        bottom: 2px;
        left: 0;
        width: 100%;
        height: 3px;
        background-color: #f97316;
      }

      .header p {
        margin-top: 8px;
        font-size: 14px;
        color: #737373;
      }

      /* przyciski - bazowe style */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 600;
        padding: 12px 20px;
        transition:
          background 0.18s,
          transform 0.18s;
        white-space: nowrap;
      }

      .btn:active {
        transform: scale(0.96);
      }

      .btn-primary {
        background: #f97316;
        color: #fff;
      }
      .btn-primary:hover {
        background: #c2510c;
      }

      .btn-danger {
        background: transparent;
        color: #ef4444;
        border: 1px solid #ef4444;
        padding: 6px 10px;
        font-size: 13px;
      }
      .btn-danger:hover {
        background: #ef4444;
        color: #fff;
      }

      /* sekcja dodawania zadań */

      .add-section {
        margin-bottom: 28px;
      }

      .add-form {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      #taskInput {
        flex: 1 1 200px;
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        border-radius: 6px;
        color: #f0ede8;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        padding: 12px 16px;
        outline: none;
        transition:
          border-color 0.18s,
          box-shadow 0.18s;
      }

      #taskInput:focus {
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
      }

      #taskInput::placeholder {
        color: #737373;
      }

      /* input */
      #taskInput {
        flex: 1 1 200px;
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        border-radius: 6px;
        color: #f0ede8;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        padding: 12px 16px;
        outline: none;
        transition:
          border-color 0.18s,
          box-shadow 0.18s;
      }

      #taskInput:focus {
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
      }

      #taskInput::placeholder {
        color: #737373;
      }

      /* filtry */
      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 16px;
        margin-bottom: 16px;
      }

      .filter-btn {
        padding: 7px 16px;
        border: 1px solid #2e2e2e;
        border-radius: 99px;
        background: #1a1a1a;
        color: #737373;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-btn:hover {
        border-color: #f97316;
        color: #f0ede8;
      }

      .filter-btn.active {
        background: #f97316;
        border-color: #f97316;
        color: #fff;
      }

/* licznik */
      #stats {
        font-size: 13px;
        color: #737373;
        margin-bottom: 14px;
        font-family: "Space Mono", monospace;
      }

      #stats strong {
        color: #f97316;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Lista <span class="underline">zadań</span></h1>
        <p>Dodaj, oznacz, filtruj. Nic nie ucieknie.</p>
      </header>

      <!-- formularz do dodawania zadań -->
      <!-- div zamaist form, żeby nie przeładowywało strony -->
      <div class="add-section">
        <div class="add-form">
          <input
            type="text"
            id="taskInput"
            placeholder="Co masz do zrobienia?"
            maxlength="200"
          />
          <button class="btn btn-primary" onclick="addTask()">+ Dodaj</button>
        </div>
      </div>

      <!-- filtry -->
      <div class="filters">
        <button class="filter-btn active">Wszystkie</button>
        <button class="filter-btn">Aktywne</button>
        <button class="filter-btn">Wykonane</button>
      </div>

      <!-- statystyki - ile/ile wykonanych zadań-->
      <p id="stats"><strong>0</strong> z <strong>0</strong> zadań do wykonania</p>

      <!-- lista zadań -->
      <ul id="task-list"></ul>

      <!-- chowane, pokazuje się jak są jakieś wykonane -->
      <div class="list-footer" id="footer" style="display: none">
        <button class="btn-ghost" onclick="clearDone()">Usuń wykonane</button>
      </div>
    </div>

    <!-- METODY -->
    <script>
      // tutaj trzymam wszystkie zadania - tablica obiektów
      let tasks = [];

      // aktualny filtr
    let currentFilter = 'all';

    // klucz do localStorage
    const STORAGE_KEY = 'todo_tasks';

    //  ładuję zadania z localStorage przy starcie (jeśli coś jest) i renderuję
    function init() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        tasks = JSON.parse(saved);
      }
      render();
    }

    // zapisuję lokalnie za każdym razem gdy coś się zmienia
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    // tymczasowy placeholder żeby strona się nie sypała przed dodaniem render()
    function addTask() { console.log('addTask - TODO'); }
    function setFilter(f) { console.log('setFilter - TODO', f); }
    function clearDone() { console.log('clearDone - TODO'); }
    function render() {
      document.getElementById('stats').innerHTML = '<strong>' + tasks.length + '</strong> zadań w storage';
    }

    init();
    </script>
  </body>
</html>
